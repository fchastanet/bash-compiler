---
$schema: https://raw.githubusercontent.com/streetsidesoftware/cspell/main/cspell.schema.json
version: "0.2"
language: en
noConfigSearch: true
caseSensitive: true
useGitignore: true
enableGlobDot: true
ignorePaths:
  - .git/**
  - "**/.git/**"
  - "**/node_modules/**"
  - .history/**
  - logs/**
  - "**/logs/**"
  - bin/**
  - "**/bin/**"
  - "**/testsData/**"
  - package-lock.json
  - "**/*.svg"
  - .vscode
  - .cspell/**
  - report
  - .jscpd.json
  - megalinter-reports
  - "*-megalinter_file_names_cspell.txt"
  - "**/*megalinter_file_names_cspell.txt"
  - .shellcheckrc
  - vendor/**
  - "**/backup/**"
  - commit-msg.md
  - .mega-linter*.yml
  - TODO.md
  - .env
  - go.sum
  - internal/utils/encoding/testsData/content.txt
dictionaryDefinitions:
  - name: forbidden
    addWords: false
    path: .cspell/forbidden.txt
  - name: myBash
    path: .cspell/bash.txt
    addWords: true
  - name: githubWorkflow
    path: .cspell/githubWorkflow.txt
    addWords: true
  - name: config
    path: .cspell/config.txt
    addWords: true
  - name: mySoftwares
    path: .cspell/softwares.txt
    addWords: true
  - name: markdown
    path: .cspell/markdown.txt
    addWords: true
  - name: lintersConfig
    path: .cspell/lintersConfig.txt
    addWords: true
  # Specific dictionaries for this repo
  - name: plantuml
    path: .cspell/plantuml.txt
    addWords: false
  - name: docker
    path: .cspell/docker.txt
    addWords: true
  - name: go
    path: .cspell/go.txt
    addWords: false
  - name: kcl
    path: .cspell/kcl.txt
    addWords: false
  - name: golangYml
    path: .cspell/golangYml.txt
    addWords: true
  - name: test
    path: .cspell/test.txt
    addWords: true
  - name: generic
    path: .cspell/generic.txt
    addWords: true

languageSettings:
  - languageId: githubWorkflow
    locale: "*"
    dictionaries:
      - githubWorkflow
      - bash
      - go
      - myBash
      - mySoftwares
      - software
  - languageId: config
    locale: "*"
    caseSensitive: true
    dictionaries:
      - config
      - mySoftwares
      - software
  - languageId: shellscript
    locale: "*"
    dictionaries:
      - bash
      - myBash
      - mySoftwares
      - software
  - languageId: markdown
    locale: "*"
    dictionaries:
      - markdown
      - mySoftwares
      - softwareTerms
      - bash
      - myBash
      - go
      - .githubWorkflow
      - software
      - plantuml

  # Specific language settings for this repo
  - languageId: dockerFiles
    locale: "*"
    dictionaries:
      - bash
      - myBash
      - docker
      - go
      - mySoftwares
      - software
  - languageId: go
    locale: "*"
    caseSensitive: true
    dictionaries:
      - go
      - mySoftwares
      - softwareTerms
      - software
  - languageId: kcl
    locale: "*"
    dictionaries:
      - kcl
      - mySoftwares
      - softwareTerms
      - software

# ----------
overrides:
  - filename:
      - ".*"
      - "*.yml"
      - "*.yaml"
      - "configs/site-config.yaml"
      - "*.toml"
      - "package.json"
      - "!.golangci.yml"
    languageId: config
  - filename:
      - .github/**/*.yml
      - .github/*.yml
      - templates-examples/**
    languageId: githubWorkflow
  - filename:
      - "*.yml"
      - "*.yaml"
      - "*.toml"
    dictionaries:
      - lintersConfig
  - filename:
      - LICENSE
      - "**/*.md"
      - "**/*-help.txt"
    languageId: markdown
  - filename:
      - "**/*.puml"
    dictionaries:
      - plantuml
  - filename: "**/*.html"
    dictionaries:
      - mySoftwares
      - software

  # Specific overrides for this repo
  - languageId: shellscript
    filename:
      - "**/*.sh"
  - filename:
      - "**/*.k"
    languageId: kcl
  - filename:
      - "**/Dockerfile"
    languageId: dockerFiles
  - filename:
      - "**/*.go"
      - go.mod
    languageId: go
  - filename:
      - "**/*_test.go"
      - internal/model/kcl/testsKcl/Fasd-binary.yaml
    languageId: go
    dictionaries:
      - test
  - filename:
      - "**/*.gtpl"
      - examples/**/*.yaml
      - .golangci.yml
    dictionaries:
      - golangYml
      - go
      - mySoftwares
      - software
      - bash
      - myBash
  - filename:
      - "**/*.cue"
    dictionaries:
      - mySoftwares
      - software

patterns:
  - name: urls
    pattern: "/https?://([^ \t\"'()]+)/g"
  - name: packages
    pattern: /[-A-Za-z0-9.]+/[-A-Za-z0-9.]+/g
  - name: markdownToc
    pattern: \]\(#[^)]+\)$
ignoreRegExpList:
  - urls
  - packages
  - markdownToc
enableFiletypes:
  - shellscript

dictionaries:
  - forbidden
