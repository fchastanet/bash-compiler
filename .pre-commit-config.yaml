---
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit, manual]
minimum_pre_commit_version: 3.5.0
fail_fast: true
repos:
  # enables pre-commit to install the hooks using pipx
  - repo: https://github.com/pypa/pipx
    rev: 1.11.1
    hooks:
      - id: pipx
        alias: yapf
        name: yapf
        args: ["yapf", "-i"]
        types: ["python"]

  - repo: local
    hooks:
      - id: v8r
        name: v8r
        entry: npx -y v8r --ci .v8rrc.yaml
        language: system
        pass_filenames: true
        stages: [pre-commit, pre-push]
        files: |
          (?x)(
            \.(yaml|yml|json)$
          )
        exclude: |
          (?x)(
            ^configs/site-config\.yaml$|
            ^\.devskim.json$|
            ^\.?secretlintrc\.yml$|
            ^\.vscode/|
            ^\.testcoverage.yml$|
            ^\.?checkov\.yml$|
            ^\.?secretlintrc\.json$|
            ^githubReleaseManager.yaml$|
            ^\.?grype\.yaml$|
            ^\.?trivy\.yaml$|
            ^\.proselintrc.json$|
            ^package\.json$|
            ^conf/postmanCli/.*\.json$|
            ^internal/model/kcl/testsKcl/bad-example\.yaml$|
            /testsData/
          )

  - repo: https://github.com/executablebooks/mdformat
    # Do this before other tools "fixing" the line endings
    rev: 0.7.22
    hooks:
      - id: mdformat
        name: Format Markdown
        entry: mdformat # Executable to run, with fixed options
        language: python
        types: [markdown]
        args: [--wrap, "120", --number]
        exclude: |
          (?x)(
            .github/
          )
        additional_dependencies:
          - mdformat-frontmatter
          - mdformat-toc
          - mdformat-shfmt
          - mdformat-tables
          - mdformat-config
          - mdformat-web
          - mdformat-gfm

  - repo: https://github.com/jsh9/markdown-heading-numbering
    rev: 0.1.0
    hooks:
      - id: markdown-heading-numbering
        args:
          - --start-from-level=2
          - --initial-numbering=1
        exclude: |
          (?x)(
            ^\.github/|
            ^doc/ai/|
            ^commit-msg-template.md$|
            AGENTS\.md
          )

  - repo: https://github.com/jsh9/markdown-toc-creator
    rev: 0.1.3
    hooks:
      - id: markdown-toc-creator
        args:
          - --proactive=False
          - --style=github
          - --quiet
          - --add-toc-title=False
          - --add-horizontal-rules=False
        exclude: |
          (?x)(
            ^\.github/|
            ^doc/ai/|
            AGENTS\.md
          )

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: mixed-line-ending
      - id: end-of-file-fixer
        exclude: |
          (?x)(
            testsData/
          )
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
        exclude: |
          (?x)(
            \.gtpl$
          )
      - id: check-xml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: fix-byte-order-marker
      - id: check-yaml
        exclude: |
          (?x)(
            ^internal/model/testsData/transformModel-error/|
            ^internal/model/testsData/transformModel-ok/BinData-commands-default-definitionFiles-duplicateKey.yaml$
          )
      - id: trailing-whitespace
        exclude: |
          (?x)(
            testsData/
          )
        stages: [pre-commit, pre-push, manual]
      - id: check-added-large-files
      - id: forbid-new-submodules
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-json
        # x modifier: extended. Spaces and text after a # in the pattern are ignored
        exclude: |
          (?x)(
            ^.vscode\/.*\.json$
          )

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        stages: [pre-commit, pre-push, manual]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - --dictionary
          - "-"
          - --dictionary
          - .cspell/codespellrc-dic.txt
          - --ignore-words
          - .cspell/codespellrc-ignore.txt
          - --quiet-level
          - "2"
          - --interactive
          - "0"
          - --check-filenames
          - --check-hidden
          - --write-changes
        exclude: >
          (?x)(
              ^.cspell/codespellrc-.*.txt$|
              ^internal/utils/digesthelper/testsData/content.txt$|
              ^.github/
          )

  - repo: https://github.com/ComPWA/prettier-pre-commit
    rev: v3.8.1
    hooks:
      - id: prettier
        args: [--cache, --ignore-unknown]
        stages: [pre-commit]
        exclude: |
          (?x)(
            \.md$|
            ^\.vscode/.*\.code-snippets$
          )

  - repo: https://github.com/fchastanet/jumanjihouse-pre-commit-hooks
    rev: 3.0.2
    hooks:
      - id: shfmt
        args: [-i, "2", -ci]
        # x modifier: extended. Spaces and text after a # in the pattern are ignored
        exclude: |
          (?x)(
            /testsData/
          )

      # Check both committed and uncommitted files for git conflict
      # markers and whitespace errors according to core.whitespace
      # and conflict-marker-size configuration in a git repo.
      - id: git-check
        exclude: |
          (?x)(
            /testsData/
          )

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.4
    hooks:
      - id: golangci-lint
      - id: golangci-lint-full
        stages: [pre-push, manual]

  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.4
    hooks:
      - id: go-build-repo-mod
      - id: go-mod-tidy-repo
      - id: go-test-mod
      - id: go-vet-repo-mod
      - id: go-fumpt-repo
        args: [-w]
        exclude: '^\.history/'
      - id: go-imports-repo
      - id: go-revive-repo-mod

  - repo: https://github.com/fchastanet/bash-tools-framework
    rev: 6.3.5
    hooks:
      - id: cspellForbidden
      - id: awkLint
      - id: shellcheckLint
      - id: plantuml
        args: [--same-dir, -f, svg, --limit-size, "8290"]
      - id: hugoUpdateLastmod
        stages: [pre-commit]
